<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sketch</title>
  </head>
  <body class="sketch-document">
    <main id="sketchSurface" class="sketch-window">
      <section class="sketch-board" aria-label="Sketch canvas">
        <canvas id="waterCanvas" class="sketch-layer"></canvas>
        <canvas id="inkCanvas" class="sketch-layer"></canvas>
        <div id="sketchBrushCursor" class="sketch-brush-cursor" aria-hidden="true"></div>
        <div id="sketchSizePreview" class="sketch-size-preview" aria-hidden="true"></div>
        <button id="sketchCloseButton" class="sketch-close-button" type="button" title="Close">
          <img src="/icons/sketch-window/close-window.svg" alt="" />
        </button>
      </section>

      <div class="sketch-controls">
        <div class="sketch-island sketch-manage-island">
          <button id="sketchClearButton" class="sketch-icon-button" type="button" title="Clear">
            <img src="/icons/sketch-window/delete-sketch.svg" alt="" />
          </button>
          <span class="sketch-history-cluster">
            <button id="sketchUndoButton" class="sketch-icon-button sketch-history-button" type="button" title="Undo">
              <img src="/icons/sketch-window/go-back.svg" alt="" />
            </button>
            <button id="sketchRedoButton" class="sketch-icon-button sketch-history-button" type="button" title="Redo">
              <img src="/icons/sketch-window/go-forward.svg" alt="" />
            </button>
          </span>
          <button id="sketchCopyButton" class="sketch-icon-button" type="button" title="Copy">
            <img src="/icons/sketch-window/copy-sketch.svg" alt="" />
          </button>
        </div>

        <div class="sketch-tool-stack">
          <label class="sketch-size-island" title="Brush size">
            <span class="sketch-size-dot"></span>
            <input id="sketchSize" type="range" min="2" max="34" value="8" aria-label="Brush size" />
            <span class="sketch-size-dot sketch-size-dot-large"></span>
          </label>

          <div class="sketch-tools-island" role="group" aria-label="Sketch tools">
            <button class="sketch-tool-button is-active" type="button" data-tool="marker" title="Marker">
              <img src="/icons/sketch-window/tool-marker.png" alt="" />
            </button>
            <button class="sketch-tool-button" type="button" data-tool="water" title="Water marker">
              <img src="/icons/sketch-window/tool-water-marker.png" alt="" />
            </button>
            <button class="sketch-tool-button" type="button" data-tool="eraser" title="Eraser">
              <img src="/icons/sketch-window/tool-eraser.png" alt="" />
            </button>
          </div>
        </div>

        <div class="sketch-right-controls">
          <div class="sketch-color-island" role="group" aria-label="Sketch colors">
            <label class="sketch-color-control" title="Color">
              <input id="sketchColor" type="color" value="#111111" aria-label="Color" />
              <span id="sketchColorPreview" class="sketch-color-preview"></span>
            </label>
            <label class="sketch-color-control" title="Background">
              <input id="sketchBackgroundColor" type="color" value="#fbfaf7" aria-label="Background" />
              <span id="sketchBackgroundPreview" class="sketch-color-preview sketch-background-preview"></span>
            </label>
          </div>

          <div class="sketch-island sketch-save-island">
            <button id="sketchSaveButton" class="sketch-icon-button sketch-add-button" type="button" title="Add sketch">
              <img src="/icons/sketch-window/add-sketch.svg" alt="" />
            </button>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="/src/sketch.ts"></script>
  </body>
</html>
