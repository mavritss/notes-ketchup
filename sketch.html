<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sketch</title>
  </head>
  <body class="sketch-document">
    <main class="sketch-window">
      <header class="sketch-header">
        <input id="sketchTitleInput" class="sketch-title-input" type="text" aria-label="Название скетча" />
      </header>

      <canvas id="sketchCanvas" class="sketch-canvas"></canvas>

      <div class="sketch-toolbar">
        <label class="sketch-size">
          <span>Толщина</span>
          <input id="sketchSize" type="range" min="1" max="18" value="5" />
        </label>
        <button id="sketchClearButton" class="sketch-action" type="button">Очистить</button>
        <button id="sketchCloseButton" class="sketch-action" type="button">Закрыть</button>
        <button id="sketchSaveButton" class="sketch-action sketch-save" type="button">Сохранить</button>
      </div>
    </main>
    <script type="module" src="/src/sketch.ts"></script>
  </body>
</html>
