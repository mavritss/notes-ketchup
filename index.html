<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes Ketchup</title>
  </head>
  <body>
    <main class="capture-shell">
      <section class="capture-card" aria-label="Быстрая заметка" id="captureCard">
        <div class="drag-zone drag-zone-top" data-drag-handle data-tauri-drag-region aria-hidden="true"></div>
        <div class="drag-zone drag-zone-left" data-drag-handle data-tauri-drag-region aria-hidden="true"></div>
        <div class="drag-zone drag-zone-right" data-drag-handle data-tauri-drag-region aria-hidden="true"></div>
        <div class="drag-zone drag-zone-bottom" data-drag-handle data-tauri-drag-region aria-hidden="true"></div>

        <textarea id="noteInput" placeholder="Текст заметки.." spellcheck="true"></textarea>

        <div id="attachments" class="attachments" aria-live="polite"></div>
        <p id="status" class="status" role="status"></p>

        <div class="toolbar">
          <div class="tool-group">
            <button id="micButton" class="icon-button" type="button" title="Диктовка будет добавлена позже" aria-label="Микрофон" disabled>
              <img src="/icons/microphone-activate.svg" alt="" />
            </button>
            <button id="attachButton" class="icon-button" type="button" title="Прикрепить файлы" aria-label="Прикрепить файлы">
              <img src="/icons/add-files.svg" alt="" />
            </button>
            <button id="sketchButton" class="icon-button" type="button" title="Создать скетч" aria-label="Создать скетч">
              <img src="/icons/create-sketch.svg" alt="" />
            </button>
          </div>

          <button id="sendButton" class="send-button" type="button" title="Сохранить заметку" aria-label="Сохранить заметку" disabled>
            <img src="/icons/send-arrow.svg" alt="" />
          </button>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
